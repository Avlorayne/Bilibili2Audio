<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilibili2Audio - 视频转音频工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <!-- 头部 -->
    <header class="text-center mb-4">
      <h1 class="display-5 fw-bold">
        <i class="bi bi-music-note-beamed"></i> Bilibili2Audio
      </h1>
      <p class="text-muted mb-0">跨平台视频转音频工具</p>
    </header>

    <!-- 系统状态栏 -->
    <div id="systemStatus" class="alert alert-info d-none mb-3">
      <div class="d-flex justify-content-between align-items-center">
        <span>
          <i class="bi bi-info-circle"></i> 
          <span id="statusText">正在检查系统状态...</span>
        </span>
        <span id="taskCount" class="badge bg-primary">任务: 0/3</span>
      </div>
    </div>

    <!-- Cookies管理 -->
    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <h6 class="mb-0">
          <i class="bi bi-key"></i> B站Cookies管理
          <span id="cookiesStatus" class="badge bg-secondary ms-2">未配置</span>
        </h6>
        <button class="btn btn-sm btn-outline-primary" onclick="toggleCookiesPanel()">
          <i class="bi bi-chevron-down" id="cookiesToggleIcon"></i>
        </button>
      </div>
      <div id="cookiesPanel" class="card-body d-none">
        <div class="row g-3 align-items-center">
          <div class="col-md-6">
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-browser-edge"></i></span>
              <select id="browserSelect" class="form-select">
                <option value="">正在检测浏览器...</option>
              </select>
            </div>
            <div class="form-text" id="browserDetectText">自动检测本机已安装的浏览器</div>
          </div>
          <div class="col-md-3">
            <button class="btn btn-success btn-sm w-100" onclick="autoExtractCookies()" id="autoExtractBtn">
              <i class="bi bi-download"></i> 一键获取
            </button>
          </div>
          <div class="col-md-3">
            <div class="btn-group btn-group-sm w-100">
              <button class="btn btn-outline-info" onclick="testCookies()">
                <i class="bi bi-check-circle"></i> 测试
              </button>
              <button class="btn btn-outline-danger" onclick="clearCookies()">
                <i class="bi bi-trash"></i> 清除
              </button>
            </div>
          </div>
        </div>
        
        <details class="mt-3">
          <summary class="text-muted small" style="cursor: pointer;">
            <i class="bi bi-chevron-right"></i> 手动粘贴Cookies
          </summary>
          <div class="mt-2">
            <div class="input-group input-group-sm">
              <textarea id="cookiesInput" class="form-control" rows="2" 
                        placeholder="从浏览器控制台复制 document.cookie 的内容粘贴到这里..."></textarea>
              <button class="btn btn-primary" onclick="saveCookies()">
                <i class="bi bi-save"></i> 保存
              </button>
            </div>
          </div>
        </details>
      </div>
    </div>

    <!-- 功能选择区域 -->
    <div class="row g-4 mb-4">
      <!-- 本地视频转换 -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">
              <i class="bi bi-file-earmark-play"></i> 本地视频转换
            </h5>
            <p class="card-text text-muted small">支持 mp4, avi, mkv, mov, wmv, flv, webm 等格式</p>
            
            <!-- 拖拽上传区域 -->
            <div id="dropZone" class="drop-zone mb-3">
              <div class="drop-zone-content">
                <i class="bi bi-cloud-upload fs-1"></i>
                <p class="mb-2">拖拽视频文件到此处或点击选择（支持多选）</p>
                <input type="file" id="fileInput" class="d-none" accept=".mp4,.avi,.mkv,.mov,.wmv,.flv,.webm,.3gp,.ts,video/*" multiple>
                <button class="btn btn-outline-primary btn-sm" id="selectFileBtn">
                  选择文件
                </button>
              </div>
            </div>
            
            <!-- 文件列表 -->
            <div id="fileList" class="d-none mb-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold small">已选择 <span id="fileCount">0</span> 个文件</span>
                <button class="btn btn-sm btn-outline-danger" onclick="clearAllFiles()">
                  清空
                </button>
              </div>
              <div id="fileListContent" class="list-group list-group-flush" style="max-height: 150px; overflow-y: auto;">
              </div>
            </div>
            
            <!-- 底部区域 -->
            <div class="mt-auto">
              <!-- 格式选择 -->
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label small">输出格式</label>
                  <select id="formatSelect" class="form-select form-select-sm">
                    <option value="mp3" selected>MP3</option>
                    <option value="flac">FLAC (无损)</option>
                    <option value="wav">WAV (无损)</option>
                    <option value="aac">AAC</option>
                    <option value="ogg">OGG</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label small">音频质量</label>
                  <select id="qualitySelect" class="form-select form-select-sm">
                    <option value="128">128 kbps</option>
                    <option value="192" selected>192 kbps</option>
                    <option value="256">256 kbps</option>
                    <option value="320">320 kbps</option>
                  </select>
                </div>
              </div>
              
              <!-- 转换按钮 -->
              <button id="convertLocalBtn" class="btn btn-primary w-100" disabled onclick="startLocalConvert()">
                <i class="bi bi-arrow-right-circle"></i> 开始转换
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- B站链接转换 -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">
              <i class="bi bi-link-45deg"></i> B站链接转换
            </h5>
            <p class="card-text text-muted small">输入B站视频链接，自动解析并转换音频</p>
            
            <!-- 链接输入 -->
            <div class="mb-3">
              <div class="input-group input-group-sm">
                <input type="text" id="bilibiliUrl" class="form-control" 
                       placeholder="https://www.bilibili.com/video/BV...">
                <button class="btn btn-outline-secondary" onclick="parseBilibili()">
                  解析
                </button>
              </div>
              <div id="urlValidation" class="form-text"></div>
            </div>
            
            <!-- 视频信息 -->
            <div id="videoInfo" class="d-none mb-3">
              <div class="card bg-light">
                <div class="card-body py-2">
                  <div class="d-flex align-items-center">
                    <img id="videoThumbnail" src="" alt="封面" class="rounded me-2" style="width: 80px; height: 45px; object-fit: cover;">
                    <div class="flex-grow-1">
                      <div id="videoTitle" class="fw-bold small">-</div>
                      <div class="text-muted small">
                        <span id="videoUploader">-</span> · 
                        <span id="videoDuration">-</span>
                      </div>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeVideoInfo()">
                      <i class="bi bi-x"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- 音频流选择 -->
            <div id="audioStreams" class="d-none mb-3">
              <label class="form-label fw-bold small">选择音频质量</label>
              <div id="audioStreamsList" class="list-group list-group-flush">
              </div>
            </div>
            
            <!-- 底部区域 -->
            <div class="mt-auto">
              <!-- 格式选择 -->
              <div class="row g-2 mb-3">
                <div class="col-12">
                  <label class="form-label small">输出格式</label>
                  <select id="biliFormatSelect" class="form-select form-select-sm">
                    <option value="mp3" selected>MP3</option>
                    <option value="flac">FLAC (无损)</option>
                    <option value="wav">WAV (无损)</option>
                    <option value="aac">AAC</option>
                    <option value="ogg">OGG</option>
                  </select>
                </div>
              </div>
              
              <!-- 转换按钮 -->
              <button id="convertBiliBtn" class="btn btn-primary w-100" disabled onclick="startBilibiliConvert()">
                <i class="bi bi-arrow-right-circle"></i> 开始下载
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 任务列表 -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <h6 class="mb-0">
          <i class="bi bi-list-task"></i> 任务列表
        </h6>
        <button class="btn btn-sm btn-outline-danger" onclick="clearCompletedTasks()">
          清除已完成
        </button>
      </div>
      <div class="card-body p-0">
        <div id="taskList" class="list-group list-group-flush">
          <div class="list-group-item text-center text-muted py-4">
            <i class="bi bi-inbox fs-1"></i>
            <p class="mb-0">暂无任务</p>
            <small>选择文件或输入链接开始转换</small>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部状态栏 -->
    <footer class="text-center text-muted mt-4 py-3 border-top">
      <small>Bilibili2Audio v1.0.0 · 本地运行，无需上传服务器</small>
    </footer>
  </div>

  <!-- 错误提示模态框 -->
  <div class="modal fade" id="errorModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> 错误</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="errorMessage">-</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
